<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu do Revendedor - Gerenciador de OS STAMPEX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-container">
        <h2>Menu do Revendedor</h2>
        <nav>
            <ul>
                <li><a href="add_revendedor.html">Adicionar Revendedor</a></li>
                <li><a href="view_revendedores.html">Ver Todos os Revendedores</a></li>
                <li id="reportsMenuItem"><a href="relatorios.html">Relatórios</a></li>
            </ul>
        </nav>
        <a href="menu.html" class="back-button">Voltar ao Menu Principal</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const username = sessionStorage.getItem('username');
            const userRole = sessionStorage.getItem('userRole');
            const reportsMenuItem = document.getElementById('reportsMenuItem');

            if (!userRole) {
                window.location.href = 'index.html';
                return;
            }

            if (reportsMenuItem && username !== 'jacira') {
                reportsMenuItem.style.display = 'none';
            }
        });
    </script>
</body>
</html>
